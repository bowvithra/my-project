<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Location Recommendation System</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<style>
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

.container {
    background: white;
    padding: 2rem;
    border-radius: 20px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    width: 100%;
    max-width: 450px;
    position: relative;
    overflow: hidden;
}

.form-container {
    display: none;
    animation: slideIn 0.5s ease-out;
}

.form-container.active {
    display: block;
}

@keyframes slideIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

.form-header {
    text-align: center;
    margin-bottom: 2rem;
}

.form-header h2 {
    color: #333;
    margin-bottom: 0.5rem;
    font-size: 2rem;
}

.form-header h2 i {
    color: #667eea;
    margin-right: 0.5rem;
}

.form-header p {
    color: #666;
    font-size: 1rem;
}

.input-group {
    position: relative;
    margin-bottom: 1.5rem;
}

.input-group i {
    position: absolute;
    left: 15px;
    top: 50%;
    transform: translateY(-50%);
    color: #999;
    z-index: 1;
}

.input-group input {
    width: 100%;
    padding: 15px 15px 15px 45px;
    border: 2px solid #e1e5e9;
    border-radius: 12px;
    font-size: 1rem;
    transition: all 0.3s ease;
    background: #f8f9fa;
}

.input-group input:focus {
    outline: none;
    border-color: #667eea;
    background: white;
    box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
}

.input-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
}

.btn-primary {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 1.1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
}

.btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
}

.form-footer {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.5rem;
    border-top: 1px solid #e1e5e9;
}

.form-footer p {
    color: #666;
}

.switch-link {
    color: #667eea;
    cursor: pointer;
    font-weight: 600;
    text-decoration: none;
}

.switch-link:hover {
    text-decoration: underline;
}

.success-message {
    display: none;
    text-align: center;
    animation: slideIn 0.5s ease-out;
}

.success-message.show {
    display: block;
}

.success-message i {
    font-size: 4rem;
    color: #28a745;
    margin-bottom: 1rem;
}

.success-message h3 {
    color: #333;
    margin-bottom: 0.5rem;
}

.success-message p {
    color: #666;
    margin-bottom: 2rem;
}

@media (max-width: 480px) {
    .container {
        margin: 1rem;
        padding: 1.5rem;
    }
    
    .input-row {
        grid-template-columns: 1fr;
    }
}
</style>
<body>
    <div class="container">
        <!-- Login Form (Default Visible) -->
        <div class="form-container active" id="loginForm">
            <div class="form-header">
                <h2><i class="fas fa-sign-in-alt"></i> Login</h2>
                <p>Welcome back! Please sign in to your account</p>
            </div>
            <form id="loginFormElement">
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="loginEmail" placeholder="Email Address" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="loginPassword" placeholder="Password" required>
                </div>
                <button type="submit" class="btn-primary">
                    <span>Login</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>
            <div class="form-footer">
                <p>Don't have an account? <span class="switch-link" onclick="showRegister()">Register here</span></p>
            </div>
        </div>

        <!-- Register Form -->
        <div class="form-container" id="registerForm">
            <div class="form-header">
                <h2><i class="fas fa-user-plus"></i> Create Account</h2>
                <p>Join our AI-driven location recommendation system</p>
            </div>
            <form id="registerFormElement">
                <div class="input-row">
                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <input type="text" id="regName" placeholder="Full Name" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-phone"></i>
                        <input type="tel" id="regPhone" placeholder="Phone Number" required>
                    </div>
                </div>
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="regEmail" placeholder="Email Address" required>
                </div>
                <div class="input-row">
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="regPassword" placeholder="Password" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-calendar"></i>
                        <input type="date" id="regDob" required>
                    </div>
                </div>
                <button type="submit" class="btn-primary">
                    <span>Create Account</span>
                    <i class="fas fa-user-plus"></i>
                </button>
            </form>
            <div class="form-footer">
                <p>Already have an account? <span class="switch-link" onclick="showLogin()">Login here</span></p>
            </div>
        </div>

        <!--button-->

        <button onclick="sendWelcomeEmail('Abiliya','abiliyak09@gmail.com')">
    Test Email
</button>

        <!-- Success Messages -->
        <div class="success-message" id="successMsg">
            <i class="fas fa-check-circle"></i>
            <h3 id="successTitle">Success!</h3>
            <p id="successText">Check your email for confirmation!</p>
            <button class="btn-primary" onclick="dashboardRedirect()">Go to Dashboard</button>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
    <script>
(function(){
    emailjs.init("zWqZVWYGhQZu6F9Bc"); // 🔥 replace
})();

function sendWelcomeEmail(name, email) {
    emailjs.send("service_45pjj9o", "template_1uxpyl3", {
        to_name: name,
        to_email: email
    })
    .then(function(response) {
        alert("✅ Email sent successfully!");
    }, function(error) {
        alert("❌ Failed to send email");
    });
}
</script>
</body>
</html>
