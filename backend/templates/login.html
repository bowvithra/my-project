<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AuthApp - Login & Register</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/imask@7.6.1/dist/imask.min.js"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>
.glass-effect {
    backdrop-filter: blur(20px);
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.2);
}
.form-input {
    transition: all 0.3s ease;
}
.form-input:focus {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}
.btn-primary {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
}
.phone-input {
    background-position: 16px center;
}
</style>
</head>

<body class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 min-h-screen flex items-center justify-center p-4">

<div class="max-w-md w-full space-y-8">

<!-- HEADER -->
<div class="text-center">
<h2 class="text-4xl font-bold text-white">AI Business Finder</h2>
</div>

<!-- TABS -->
<div class="glass-effect rounded-2xl p-1">
<div class="flex bg-white/10 rounded-xl">
<button id="loginTab" class="flex-1 py-3 text-white bg-white/20 rounded-xl">Login</button>
<button id="registerTab" class="flex-1 py-3 text-white/70 rounded-xl">Register</button>
</div>
</div>

<!-- LOGIN -->
<div id="loginForm" class="glass-effect rounded-3xl p-8">
<form id="loginFormSubmit" autocomplete="off">

<input type="email" id="loginEmail" placeholder=" Enter your email" autocomplete="off" required class="form-input w-full mb-4 p-3 rounded-xl">

<input type="password" id="loginPassword" placeholder="Enter your password" autocomplete="new-password" required class="form-input w-full mb-4 p-3 rounded-xl">

<button type="submit" class="btn-primary w-full p-3 rounded-xl text-white">Login</button>

</form>
</div>

<!-- REGISTER -->
<div id="registerForm" class="glass-effect rounded-3xl p-8 hidden">
<form id="registerFormSubmit" autocomplete="off">

<input type="text" id="regName" placeholder="Full Name" required class="form-input w-full mb-3 p-3 rounded-xl">

<input type="email" id="regEmail" placeholder="Email" autocomplete="off" class="form-input w-full mb-3 p-3 rounded-xl">

<input type="tel" id="regPhone" placeholder="Phone Number" required class="form-input w-full mb-3 p-3 rounded-xl">

<input type="password" id="regPassword" placeholder="Password" autocomplete="new-password" required class="form-input w-full mb-3 p-3 rounded-xl">

<button type="submit" class="btn-primary w-full p-3 rounded-xl text-white">Register</button>

</form>
</div>

</div>

<!-- SCRIPT -->
<script>

document.addEventListener("DOMContentLoaded", function () {

    // TAB SWITCH
    const loginTab = document.getElementById('loginTab');
    const registerTab = document.getElementById('registerTab');
    const loginForm = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');

    loginTab.onclick = () => {
        loginForm.classList.remove('hidden');
        registerForm.classList.add('hidden');
    };

    registerTab.onclick = () => {
        registerForm.classList.remove('hidden');
        loginForm.classList.add('hidden');
    };

    // PHONE MASK
    const phoneMask = IMask(document.getElementById('regPhone'), {
        mask: '+{91} 000 000 0000'
    });

    // LOGIN
    document.getElementById('loginFormSubmit').addEventListener('submit', async function(e){
        e.preventDefault();

        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;

        try {
            const res = await fetch("http://127.0.0.1:5000/login", {
                method: "POST",
                headers: {"Content-Type":"application/json"},
                body: JSON.stringify({email, password})
            });

            const data = await res.json();

            if(res.ok){
                // alert("Login Success");
                window.location.href = "/home";
            } else {
                alert(data.message);
            }

        } catch(err){
            alert("Server Error");
        }
    });

    // REGISTER
    document.getElementById('registerFormSubmit').addEventListener('submit', async function(e){
        e.preventDefault();

        const name = document.getElementById('regName').value;
        const email = document.getElementById('regEmail').value;
        const phone = document.getElementById('regPhone').value;
        const password = document.getElementById('regPassword').value;

        try {
            const res = await fetch("http://127.0.0.1:5000/register", {
                method: "POST",
                headers: {"Content-Type":"application/json"},
                body: JSON.stringify({name, email, phone, password})
            });

            const data = await res.json();

            if(res.ok){
                alert("Registration Successful");
                document.getElementById('registerFormSubmit').reset();
            } else {
                alert(data.message);
            }

        } catch(err){
            alert("Server Error");
        }
    });

});


document.addEventListener("DOMContentLoaded", function () {
    document.getElementById("loginEmail").value = "";
    document.getElementById("loginPassword").value = "";
});

</script>

</body>
</html>
