<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
--primary-gradient:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
--success-gradient:linear-gradient(45deg,#28a745,#20c997);
--ai-gradient:linear-gradient(45deg,#ff6b6b,#ffa500);
}
*{font-family:'Poppins',sans-serif;}
body{background:linear-gradient(135deg,#f5f7fa 0%,#c3cfe2 100%);min-height:100vh;}
.navbar-custom{background:var(--primary-gradient);box-shadow:0 10px 30px rgba(0,0,0,0.2);padding:1rem 0;}
.navbar-custom .nav-link{color:white!important;margin:0 1rem;}
.ai-hero{background:var(--primary-gradient);color:white;padding:4rem 0;border-radius:0 0 50px 50px;margin-bottom:3rem;}
.business-card{border:none;border-radius:20px;overflow:hidden;transition:.4s;box-shadow:0 10px 30px rgba(0,0,0,0.1);position:relative;}
.business-card:hover{transform:translateY(-10px);box-shadow:0 20px 40px rgba(0,0,0,0.2);}
.business-card img{height:400px;object-fit:cover;}
.ai-badge{position:absolute;top:15px;right:15px;background:var(--ai-gradient);color:white;padding:.5rem 1rem;border-radius:20px;font-size:.8rem;}
.investment-badge{background:var(--success-gradient);color:white;padding:.4rem 1rem;border-radius:20px;font-size:.9rem;}
.success-rate{background:#e8f5e9;border:2px solid #a5d6a7;color:#2e7d32;padding:.3rem .8rem;border-radius:15px;font-size:.85rem;}
</style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-custom fixed-top">
<div class="container">
<a class="navbar-brand text-white fw-bold" href="home">
<i class="fas fa-robot"></i> SmartBiz AI
</a>

<div class="collapse navbar-collapse">
<ul class="navbar-nav ms-auto">
<li><a class="nav-link" href="/home">🏠Home</a></li>
<li><a class="nav-link" href="/recommendations">🤖AI Recommendations</a></li>
<li><a class="nav-link active" href="/innovationhub">💡Innovation Hub</a></li>
<li><a class="nav-link" href="/admin">⚙️Admin</a></li>

</div>
</div>

<section class="ai-hero">
<div class="container">
<h1 class="display-4 fw-bold">AI-Powered Innovation Hub</h1>

<button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
</div>
<div class="modal-body" id="modalContent"></div>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>


<script>

// ✅ UPDATED CARD UI (added desc + investment badge)
function generateRecommendations(city){
const grid=document.getElementById("businessGrid");
grid.innerHTML="";

businessData.forEach(business=>{
grid.innerHTML+=`
<div class="col-lg-4">
<div class="card business-card">

<img src="${business.img}" class="card-img-top">

<div class="card-body">

<h5>${business.name}</h5>

<p style="font-size:14px;color:#555;">
${business.desc}
</p>

<div class="mb-2">
<span class="investment-badge">
Investment: ${business.investment}
</span>
</div>

<button class="btn btn-primary w-100"
onclick="showBusinessDetails('${business.name}','${city}')">
View Details
</button>

</div>
</div>
</div>`;
});
}


// ✅ UPDATED MODAL (full details)
function showBusinessDetails(name,city){

const business = businessData.find(b => b.name === name);

document.getElementById("modalContent").innerHTML=`
<h4>${business.name}</h4>

<p><b>Location Suitability:</b> Best for ${city}</p>

<p><b>Explanation:</b> ${business.desc}</p>

<p><b>Investment Required:</b> ${business.investment}</p>

<p><b>Success Rate:</b> ${business.successRate}%</p>

<p><b>Why this business?</b><br>
This business has strong demand, scalable growth, and suits modern market trends in ${city}.
</p>
`;

new bootstrap.Modal(document.getElementById("businessModal")).show();
}


// BACKEND SAME (no change)
document.addEventListener("DOMContentLoaded", function() {

fetch("http://127.0.0.1:5001/recommend", {
method: "POST",
headers: {"Content-Type": "application/json"},
body: JSON.stringify({
location: "chennai",
area_type: "mixed",
population_density: "high population",
footfall: "high footfall"
})
})
.then(res => res.json())
.then(data => {
generateRecommendations(data.location || "Chennai");
})
.catch(() => {
generateRecommendations("Chennai");
});

});

</script>

</body>
</html>
